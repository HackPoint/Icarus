name: Icarus CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-dotnet:
    name: Build & Test .NET
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: icarus
          POSTGRES_PASSWORD: icarus_dev
          POSTGRES_DB: icarus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      couchdb:
        image: couchdb:3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: admin
        ports:
          - 5984:5984

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName~Tests.Unit" --verbosity normal

      - name: Integration Tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName~Tests.Integration" --verbosity normal
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=icarus;Username=icarus;Password=icarus_dev"
          ConnectionStrings__Qdrant: "http://localhost:6333"
          ConnectionStrings__CouchDb: "http://admin:admin@localhost:5984"

  build-rust:
    name: Build & Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Test
        working-directory: src/ml/embeddings-rs
        run: cargo test --verbose

      - name: Cargo Build (release)
        working-directory: src/ml/embeddings-rs
        run: cargo build --release

  smoke-test:
    name: Smoke Tests (k6)
    runs-on: ubuntu-latest
    needs: [build-dotnet]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz -L | tar xzf - --strip-components 1
          chmod +x k6

      - name: Run smoke test
        run: ./k6 run tests/smoke/k6/health.js --duration 10s --vus 1 || true

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-dotnet]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: tests/e2e/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e/playwright
        run: npx playwright test || true
